<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>C Programming — Practical Exam Study Guide</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;600;700&family=Syne:wght@400;600;700;800&display=swap">
<style>
:root{
  --bg:#07090f;--surface:#0c0f18;--card:#111520;--border:#1c2236;--bhi:#2a344f;
  --accent:#00e5ff;--ad:rgba(0,229,255,.10);--a2:#7c3aed;--a3:#f59e0b;
  --green:#10b981;--red:#ef4444;--text:#dde4f0;--t2:#8896b3;--muted:#4f5e7a;
  --cbg:#070910;--r:14px;--rs:8px;
}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:'Syne',system-ui,sans-serif;min-height:100vh;overflow-x:hidden;-webkit-font-smoothing:antialiased;}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(0,229,255,.016) 1px,transparent 1px),linear-gradient(90deg,rgba(0,229,255,.016) 1px,transparent 1px);background-size:52px 52px;pointer-events:none;z-index:0;}
body::after{content:'';position:fixed;top:-80px;left:50%;transform:translateX(-50%);width:700px;height:500px;background:radial-gradient(ellipse,rgba(0,229,255,.055) 0%,transparent 68%);pointer-events:none;z-index:0;}

/* HEADER */
header{position:relative;z-index:10;padding:48px 44px 34px;border-bottom:1px solid var(--border);background:linear-gradient(180deg,rgba(0,229,255,.03) 0%,transparent 100%);}
.eyebrow{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--accent);letter-spacing:4px;text-transform:uppercase;margin-bottom:14px;display:flex;align-items:center;gap:10px;}
.eyebrow::before{content:'';width:28px;height:1px;background:var(--accent);}
h1{font-size:clamp(2rem,5.5vw,3.6rem);font-weight:800;line-height:1.06;letter-spacing:-2.5px;}
h1 em{color:var(--accent);font-style:normal;}
.subtitle{margin-top:9px;color:var(--muted);font-size:.82rem;font-family:'JetBrains Mono',monospace;}
.stats-row{display:flex;gap:28px;margin-top:26px;flex-wrap:wrap;}
.stat{display:flex;flex-direction:column;gap:2px;}
.stat-num{font-size:1.5rem;font-weight:800;color:var(--accent);font-family:'JetBrains Mono',monospace;line-height:1;}
.stat-label{font-size:.6rem;color:var(--muted);letter-spacing:2px;text-transform:uppercase;}

/* TOOLBAR */
.toolbar{position:sticky;top:0;z-index:50;padding:11px 44px;border-bottom:1px solid var(--border);background:rgba(10,12,20,.94);backdrop-filter:blur(22px);-webkit-backdrop-filter:blur(22px);display:flex;flex-direction:column;gap:9px;}
.toolbar-top{display:flex;align-items:center;gap:8px;}
.search-wrap{position:relative;flex:1;max-width:400px;}
.search-wrap svg{position:absolute;left:11px;top:50%;transform:translateY(-50%);width:14px;height:14px;color:var(--muted);pointer-events:none;}
.search-input{width:100%;padding:8px 14px 8px 33px;background:var(--card);border:1px solid var(--border);border-radius:var(--rs);color:var(--text);font-family:'Syne',sans-serif;font-size:13px;outline:none;transition:border-color .2s,box-shadow .2s;}
.search-input::placeholder{color:var(--muted);}
.search-input:focus{border-color:var(--accent);box-shadow:0 0 0 2px var(--ad);}
.clear-btn{padding:7px 12px;background:transparent;border:1px solid var(--border);border-radius:var(--rs);color:var(--muted);font-family:'JetBrains Mono',monospace;font-size:10px;cursor:pointer;transition:all .2s;white-space:nowrap;display:none;align-items:center;gap:4px;}
.clear-btn.visible{display:flex;}
.clear-btn:hover{border-color:var(--red);color:var(--red);}
.filter-row{display:flex;gap:5px;flex-wrap:wrap;align-items:center;}
.filter-label{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--muted);letter-spacing:1.5px;margin-right:3px;}
.filter-btn{font-family:'JetBrains Mono',monospace;font-size:10px;padding:4px 12px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;transition:all .2s;white-space:nowrap;}
.filter-btn:hover{border-color:var(--accent);color:var(--accent);}
.filter-btn.active{background:var(--accent);color:#000;border-color:var(--accent);font-weight:700;}
.filter-btn[data-tag="basics"].active{background:#10b981;border-color:#10b981;}
.filter-btn[data-tag="conditionals"].active{background:#f59e0b;border-color:#f59e0b;}
.filter-btn[data-tag="switch"].active{background:#00e5ff;border-color:#00e5ff;}
.filter-btn[data-tag="loops"].active{background:#a78bfa;border-color:#a78bfa;}
.filter-btn[data-tag="arrays"].active{background:#ef4444;border-color:#ef4444;color:#fff;}

/* PROGRESS */
.prog-wrap{padding:0 44px;background:var(--surface);border-bottom:1px solid var(--border);position:relative;z-index:10;}
.prog-inner{display:flex;align-items:center;gap:10px;padding:9px 0;}
.prog-track{flex:1;height:3px;background:var(--border);border-radius:2px;overflow:hidden;}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--a2));border-radius:2px;transition:width .6s cubic-bezier(.4,0,.2,1);width:0%;}
.prog-text{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--muted);white-space:nowrap;min-width:88px;text-align:right;}
.reset-btn{font-family:'JetBrains Mono',monospace;font-size:9px;padding:3px 8px;background:transparent;border:1px solid var(--border);border-radius:4px;color:var(--muted);cursor:pointer;transition:all .2s;}
.reset-btn:hover{border-color:var(--red);color:var(--red);}
.results-meta{padding:8px 44px 0;font-family:'JetBrains Mono',monospace;font-size:9.5px;color:var(--muted);position:relative;z-index:10;display:none;}

/* GRID */
main{position:relative;z-index:10;padding:16px 44px 100px;max-width:1480px;margin:0 auto;}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:15px;}
.empty-state{grid-column:1/-1;text-align:center;padding:80px 20px;color:var(--muted);font-size:.9rem;}

/* CARD */
.q-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;transition:transform .28s cubic-bezier(.22,.61,.36,1),border-color .28s,box-shadow .28s;animation:fadeUp .38s ease both;display:flex;flex-direction:column;}
.q-card:hover{transform:translateY(-3px);border-color:rgba(0,229,255,.28);box-shadow:0 0 44px rgba(0,229,255,.06);}
.q-card.learned{border-color:rgba(16,185,129,.42);}
.q-card.learned .q-num{background:var(--green);}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:translateY(0);}}
.q-header{padding:15px 17px 12px;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;gap:9px;}
.q-num{font-family:'JetBrains Mono',monospace;font-size:9px;font-weight:700;background:var(--accent);color:#000;padding:3px 7px;border-radius:4px;flex-shrink:0;margin-top:2px;transition:background .3s;}
.q-title{font-size:.855rem;font-weight:700;line-height:1.4;flex:1;}
.q-tag{font-family:'JetBrains Mono',monospace;font-size:8px;padding:2px 7px;border-radius:20px;flex-shrink:0;margin-top:3px;white-space:nowrap;}
.tag-basics{background:rgba(16,185,129,.1);color:#10b981;border:1px solid rgba(16,185,129,.22);}
.tag-conditionals{background:rgba(245,158,11,.1);color:#f59e0b;border:1px solid rgba(245,158,11,.22);}
.tag-loops{background:rgba(124,58,237,.1);color:#a78bfa;border:1px solid rgba(124,58,237,.22);}
.tag-switch{background:rgba(0,229,255,.1);color:var(--accent);border:1px solid rgba(0,229,255,.22);}
.tag-arrays{background:rgba(239,68,68,.1);color:#ef4444;border:1px solid rgba(239,68,68,.22);}
.q-body{padding:13px 17px 15px;display:flex;flex-direction:column;flex:1;}
.brief{font-size:.79rem;color:var(--t2);line-height:1.7;margin-bottom:11px;}
.code-toggle{width:100%;background:transparent;border:1px solid var(--border);color:var(--accent);font-family:'JetBrains Mono',monospace;font-size:10px;padding:6px 11px;border-radius:6px;cursor:pointer;text-align:left;display:flex;align-items:center;gap:7px;transition:all .2s;margin-bottom:6px;}
.code-toggle:hover{background:var(--ad);border-color:var(--accent);}
.code-toggle .caret{transition:transform .28s;margin-left:auto;font-size:9px;opacity:.6;}
.code-toggle.open .caret{transform:rotate(180deg);}
.code-block{display:none;background:var(--cbg);border:1px solid var(--border);border-radius:var(--rs);overflow:hidden;margin-bottom:7px;}
.code-block.visible{display:block;animation:slideDown .2s ease;}
@keyframes slideDown{from{opacity:0;transform:translateY(-5px);}to{opacity:1;transform:translateY(0);}}
.code-bar{background:#05070d;padding:6px 11px;display:flex;align-items:center;gap:6px;border-bottom:1px solid var(--border);}
.dot{width:8px;height:8px;border-radius:50%;}
.dot-r{background:#ff5f56;}.dot-y{background:#ffbd2e;}.dot-g{background:#27c93f;}
.code-fname{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--muted);margin-left:3px;}
.copy-btn{margin-left:auto;font-family:'JetBrains Mono',monospace;font-size:9px;padding:2px 7px;background:transparent;border:1px solid var(--border);border-radius:3px;color:var(--muted);cursor:pointer;transition:all .2s;}
.copy-btn:hover{color:var(--accent);border-color:var(--accent);}
.copy-btn.copied{color:var(--green);border-color:var(--green);}
pre{padding:12px 13px;overflow-x:auto;font-family:'JetBrains Mono',monospace;font-size:11px;line-height:1.75;color:#cdd6f4;-webkit-overflow-scrolling:touch;}
.kw{color:#cba6f7;font-weight:600;}.fn{color:#89b4fa;}.str{color:#a6e3a1;}.num{color:#fab387;}.cm{color:#585b70;font-style:italic;}.type{color:#f38ba8;}
.concepts{margin-top:7px;display:flex;flex-wrap:wrap;gap:4px;}
.concept{font-family:'JetBrains Mono',monospace;font-size:8px;padding:2px 6px;background:rgba(255,255,255,.022);border:1px solid var(--border);border-radius:4px;color:var(--muted);cursor:default;transition:color .2s,border-color .2s;}
.concept:hover{color:var(--accent);border-color:rgba(0,229,255,.28);}
.card-actions{display:flex;gap:5px;margin-top:auto;padding-top:11px;}
.detail-btn,.learn-btn{font-family:'JetBrains Mono',monospace;font-size:9px;padding:5px 11px;background:transparent;border-radius:5px;cursor:pointer;transition:all .2s;display:inline-flex;align-items:center;gap:4px;}
.detail-btn{border:1px solid rgba(0,229,255,.25);color:var(--accent);}
.detail-btn:hover{background:var(--ad);}
.learn-btn{border:1px solid rgba(16,185,129,.25);color:var(--green);margin-left:auto;}
.learn-btn:hover{background:rgba(16,185,129,.07);}
.learn-btn.active{background:rgba(16,185,129,.13);border-color:var(--green);}

/* MODAL */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.88);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);z-index:200;overflow-y:auto;}
.modal-overlay.active{display:block;}
.modal-wrap{min-height:100%;display:flex;align-items:flex-start;justify-content:center;padding:0;}
@media(min-width:860px){.modal-wrap{align-items:center;padding:20px;}}
.modal{background:var(--card);border:1px solid var(--bhi);width:100%;min-height:100vh;animation:modalIn .25s cubic-bezier(.22,.61,.36,1);display:flex;flex-direction:column;}
@media(min-width:860px){.modal{border-radius:18px;max-width:1060px;min-height:auto;max-height:92vh;overflow:hidden;}}
@keyframes modalIn{from{opacity:0;transform:scale(.97) translateY(10px);}to{opacity:1;transform:scale(1) translateY(0);}}

/* modal header */
.m-hdr{padding:16px 22px 13px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;flex-shrink:0;background:var(--card);position:sticky;top:0;z-index:5;}
.m-qnum{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--accent);letter-spacing:2px;white-space:nowrap;}
.m-title{font-size:.95rem;font-weight:700;flex:1;line-height:1.3;}
.m-nav{font-family:'JetBrains Mono',monospace;font-size:9px;padding:5px 9px;background:transparent;border:1px solid var(--border);border-radius:5px;color:var(--muted);cursor:pointer;transition:all .2s;white-space:nowrap;}
.m-nav:hover{border-color:var(--accent);color:var(--accent);}
.m-nav:disabled{opacity:.2;cursor:not-allowed;}
.m-close{background:transparent;border:1px solid var(--border);color:var(--muted);width:30px;height:30px;border-radius:var(--rs);cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .2s;}
.m-close:hover{color:var(--text);border-color:var(--text);}

/* modal two-col */
.m-body{display:flex;flex:1;overflow:hidden;min-height:0;}
@media(max-width:859px){.m-body{flex-direction:column;overflow:visible;}}

/* left — explanation */
.m-left{flex:1;padding:20px 22px;overflow-y:auto;border-right:1px solid var(--border);}
@media(max-width:859px){.m-left{border-right:none;border-bottom:1px solid var(--border);overflow:visible;}}

/* section titles */
.sec{font-family:'JetBrains Mono',monospace;font-size:8px;letter-spacing:3px;text-transform:uppercase;color:var(--accent);margin-bottom:8px;margin-top:20px;display:flex;align-items:center;gap:8px;}
.sec:first-child{margin-top:0;}
.sec::after{content:'';flex:1;height:1px;background:var(--border);}

/* explanation text */
.expl{font-size:.83rem;color:var(--t2);line-height:1.9;}
.expl strong{color:var(--text);font-weight:600;}
.expl code{font-family:'JetBrains Mono',monospace;font-size:.77rem;background:rgba(0,229,255,.07);padding:1px 5px;border-radius:3px;color:var(--accent);}

/* what happens box */
.what-box{margin-top:12px;padding:13px 15px;background:rgba(0,229,255,.04);border:1px solid rgba(0,229,255,.12);border-radius:var(--rs);border-left:3px solid var(--accent);}
.what-box-title{font-family:'JetBrains Mono',monospace;font-size:8.5px;color:var(--accent);letter-spacing:2px;text-transform:uppercase;margin-bottom:8px;}
.what-box p{font-size:.79rem;color:var(--t2);line-height:1.8;margin-bottom:6px;}
.what-box p:last-child{margin-bottom:0;}
.what-box code{font-family:'JetBrains Mono',monospace;font-size:.75rem;background:rgba(0,229,255,.08);padding:1px 4px;border-radius:3px;color:var(--accent);}

/* annotated breakdown */
.breakdown{display:flex;flex-direction:column;gap:4px;margin-top:10px;}
.bk{display:grid;grid-template-columns:auto 1fr;gap:0;border-radius:8px;overflow:hidden;border:1px solid var(--border);transition:border-color .2s;}
.bk:hover{border-color:rgba(0,229,255,.22);}
.bk-code{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--accent);background:rgba(0,229,255,.05);padding:8px 11px;white-space:nowrap;border-right:1px solid var(--border);}
.bk-text{font-size:.77rem;color:var(--t2);line-height:1.6;padding:8px 12px;}
.bk-text strong{color:var(--text);font-weight:600;}
.bk-text code{font-family:'JetBrains Mono',monospace;font-size:.72rem;background:rgba(0,229,255,.07);padding:1px 4px;border-radius:3px;color:var(--accent);}

/* common mistakes box */
.mistakes{margin-top:12px;padding:12px 14px;background:rgba(239,68,68,.04);border:1px solid rgba(239,68,68,.15);border-radius:var(--rs);border-left:3px solid var(--red);}
.mistakes-title{font-family:'JetBrains Mono',monospace;font-size:8.5px;color:var(--red);letter-spacing:2px;text-transform:uppercase;margin-bottom:7px;}
.mistake-row{display:flex;gap:8px;margin-bottom:6px;align-items:flex-start;}
.mistake-row:last-child{margin-bottom:0;}
.mistake-x{color:var(--red);font-size:11px;flex-shrink:0;margin-top:1px;}
.mistake-txt{font-size:.76rem;color:var(--t2);line-height:1.6;}
.mistake-txt code{font-family:'JetBrains Mono',monospace;font-size:.72rem;background:rgba(239,68,68,.08);padding:1px 4px;border-radius:3px;color:#fc8a8a;}

/* syntax tip */
.syn{margin-top:12px;padding:12px 14px;background:rgba(124,58,237,.06);border:1px solid rgba(124,58,237,.18);border-radius:var(--rs);border-left:3px solid var(--a2);}
.syn-lbl{font-family:'JetBrains Mono',monospace;font-size:8.5px;color:#a78bfa;letter-spacing:2px;text-transform:uppercase;margin-bottom:5px;}
.syn-txt{font-size:.78rem;color:var(--t2);line-height:1.75;}
.syn-txt code{font-family:'JetBrains Mono',monospace;font-size:.73rem;background:rgba(124,58,237,.12);padding:1px 4px;border-radius:3px;color:#c4b5fd;}

/* concepts row */
.concepts-m{display:flex;flex-wrap:wrap;gap:4px;margin-top:10px;}

/* output box */
.out-box{margin-top:10px;padding:10px 12px;background:rgba(16,185,129,.04);border:1px solid rgba(16,185,129,.14);border-radius:var(--rs);}
.out-lbl{font-family:'JetBrains Mono',monospace;font-size:8.5px;color:var(--green);letter-spacing:2px;text-transform:uppercase;margin-bottom:5px;}
.out-txt{font-family:'JetBrains Mono',monospace;font-size:10.5px;color:var(--green);line-height:1.65;white-space:pre-wrap;}

/* modal footer */
.m-foot{padding:10px 22px;border-top:1px solid var(--border);display:flex;align-items:center;gap:8px;flex-shrink:0;background:var(--card);}
.m-foot .learn-btn{font-size:10px;padding:6px 14px;}

/* right panel */
.m-right{width:440px;flex-shrink:0;display:flex;flex-direction:column;overflow:hidden;background:var(--cbg);}
@media(max-width:1059px){.m-right{width:360px;}}
@media(max-width:859px){.m-right{width:100%;min-height:520px;}}

/* code panel header */
.code-panel-hdr{padding:9px 13px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:7px;flex-shrink:0;background:#05070d;}
.code-panel-fname{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--muted);flex:1;}
.cp-btn{font-family:'JetBrains Mono',monospace;font-size:8.5px;padding:3px 9px;background:transparent;border:1px solid var(--border);border-radius:4px;color:var(--muted);cursor:pointer;transition:all .2s;}
.cp-btn:hover{border-color:var(--accent);color:var(--accent);}

/* code display */
.code-display{flex:1;overflow-y:auto;padding:14px;}
.code-display pre{font-family:'JetBrains Mono',monospace;font-size:11.5px;line-height:1.85;color:#cdd6f4;white-space:pre;}

/* TRY IT section */
.tryit-panel{border-top:1px solid var(--border);flex-shrink:0;background:var(--surface);}
.tryit-hdr{padding:8px 13px;display:flex;align-items:center;gap:8px;border-bottom:1px solid var(--border);cursor:pointer;user-select:none;}
.tryit-hdr-lbl{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--a3);letter-spacing:2px;text-transform:uppercase;flex:1;}
.tryit-hdr-icon{font-size:11px;color:var(--a3);transition:transform .25s;}
.tryit-hdr-icon.open{transform:rotate(180deg);}
.tryit-body{display:none;padding:12px 13px;display:flex;flex-direction:column;gap:9px;}
.tryit-body.hidden{display:none;}

/* input row */
.ti-row{display:flex;flex-direction:column;gap:4px;}
.ti-label{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--muted);letter-spacing:1px;}
.ti-input{background:var(--card);border:1px solid var(--border);border-radius:5px;color:var(--text);font-family:'JetBrains Mono',monospace;font-size:12px;padding:7px 10px;outline:none;transition:border-color .2s;width:100%;}
.ti-input:focus{border-color:var(--accent);}
.ti-input[type=range]{padding:4px 0;border:none;background:transparent;cursor:pointer;accent-color:var(--accent);}
.ti-select{background:var(--card);border:1px solid var(--border);border-radius:5px;color:var(--text);font-family:'JetBrains Mono',monospace;font-size:11px;padding:6px 9px;outline:none;cursor:pointer;width:100%;}

/* run button */
.ti-run{width:100%;padding:8px;background:linear-gradient(135deg,rgba(0,229,255,.12),rgba(124,58,237,.12));border:1px solid rgba(0,229,255,.3);border-radius:6px;color:var(--accent);font-family:'JetBrains Mono',monospace;font-size:10px;cursor:pointer;transition:all .2s;letter-spacing:1px;}
.ti-run:hover{background:linear-gradient(135deg,rgba(0,229,255,.2),rgba(124,58,237,.2));box-shadow:0 0 16px rgba(0,229,255,.1);}

/* output terminal */
.ti-terminal{background:#03040a;border:1px solid var(--border);border-radius:6px;padding:10px 12px;font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--green);line-height:1.75;min-height:58px;white-space:pre-wrap;display:none;}
.ti-terminal.visible{display:block;animation:slideDown .18s ease;}

/* notes */
.notes-wrap{border-top:1px solid var(--border);flex-shrink:0;}
.notes-lbl{padding:7px 13px;font-family:'JetBrains Mono',monospace;font-size:8.5px;color:var(--muted);letter-spacing:2px;border-bottom:1px solid var(--border);background:#04050c;}
.notes-ta{width:100%;background:#04050c;border:none;color:var(--t2);font-family:'JetBrains Mono',monospace;font-size:11px;line-height:1.7;padding:9px 13px;resize:none;outline:none;height:72px;}
.notes-ta::placeholder{color:var(--muted);}

/* BACK TO TOP */

<script>
/* ═══════════════════════════════════════════════════════
   DATA — 20 questions, each with deep beginner explanations
   and a tryIt config for the interactive panel
═══════════════════════════════════════════════════════ */
const Q = [
  {
    num:1, title:"Basic Calculator (all operations)", tag:"basics", tagLabel:"Basics",
    brief:"Accept two numbers and perform +, −, ×, ÷ printing all results at once.",
    concepts:["float","scanf / printf","%f specifier","arithmetic operators","& address-of"],

    explanation:`
<p>Before we write any code, let's understand the <strong>goal</strong>: the user types two numbers, and the program spits out what happens when you add, subtract, multiply, and divide them. Simple — but there are many small details to get right.</p>

<p><strong>Why float, not int?</strong> If you used <code>int</code> (whole numbers) and divided 10 by 3, C would give you <code>3</code> — it just chops off the decimal part. By using <code>float</code>, we get <code>3.333333</code>, which is the real mathematical answer. Always use <code>float</code> when your answer might have a decimal point.</p>

<p><strong>What is scanf?</strong> <code>printf</code> sends text <em>to</em> the screen. <code>scanf</code> reads text <em>from</em> the keyboard. When you write <code>scanf("%f", &a)</code>, the <code>%f</code> tells scanf "expect a decimal number", and the <code>&a</code> means "put it in the memory slot called a". The <code>&</code> symbol is called the address-of operator — without it, scanf has no idea where to store the value and your program will likely crash.</p>

<p><strong>Why declare all variables at the top?</strong> In C89 (the standard you're learning), you <em>must</em> declare all variables before any other statements in a block. This is a rule of the language — write all your <code>float</code> and <code>int</code> declarations at the very top of <code>main()</code>.</p>`,

    whatHappens:[
      "The program starts and hits the first <code>printf</code> — this prints the prompt text to the screen.",
      "It reaches <code>scanf(\"%f\", &a)</code> — the program <strong>pauses</strong> and waits for you to type a number. When you press Enter, the value is stored in variable <code>a</code>.",
      "Same happens for <code>b</code>.",
      "Then the four arithmetic expressions are computed and stored: <code>sum = a + b</code>, <code>sub = a - b</code>, etc.",
      "Finally, four <code>printf</code> calls each print one result. <code>%f</code> is replaced with the actual float value."
    ],

    breakdown:[
      { code:"float a, b, sum, sub, mul, divide;", text:"Declares six float variables in one line. They all start with garbage values (whatever is in memory) — that's fine, because we fill them before using them." },
      { code:'printf("Enter first number: ");',    text:"Prints a message to the screen. Notice there is NO <code>\\n</code> at the end — the cursor stays on the same line so the user types right after the colon." },
      { code:'scanf("%f", &a);',                   text:"Reads one decimal number from keyboard and stores it in <code>a</code>. The <code>&</code> gives scanf the memory address of <code>a</code>. Without <code>&</code> it's a classic bug." },
      { code:"sum = a + b;",                       text:"The <code>+</code> operator adds two floats. C evaluates the right side first, then copies the result into <code>sum</code> on the left." },
      { code:"divide = a / b;",                    text:"Float division. If both were <code>int</code>, this would truncate. Because they're <code>float</code>, you get the full decimal answer." },
      { code:'printf("sum = %f\\n", sum);',        text:"<code>%f</code> is a placeholder replaced by the value of <code>sum</code>. <code>\\n</code> moves the cursor to the next line after printing." },
    ],

    mistakes:[
      { text:"Writing <code>scanf(\"%f\", a)</code> without the <code>&</code> — scanf needs the address, not the value. The program will crash or behave randomly." },
      { text:"Using <code>%d</code> instead of <code>%f</code> for floats — <code>%d</code> is for integers. Mixing format specifiers gives completely wrong output." },
      { text:"Initializing to 0 unnecessarily — it's fine but not required when you assign a value before using it." },
    ],

    syntaxTip:"<code>%f</code> prints 6 decimal places by default. Use <code>%.2f</code> to show exactly 2 (like money). Use <code>%e</code> for scientific notation. The letter after <code>%</code> must match the variable type: <code>%d</code>=int, <code>%f</code>=float, <code>%c</code>=char.",

    output:"Enter first number: 10\nEnter second number: 3\nsum      = 13.000000\nsubtract = 7.000000\nmultiply = 30.000000\ndivide   = 3.333333",

    rawCode:`#include <stdio.h>

int main() {
    float a, b, sum, sub, mul, divide;

    printf("Enter first number: ");
    scanf("%f", &a);
    printf("Enter second number: ");
    scanf("%f", &b);

    sum    = a + b;
    sub    = a - b;
    mul    = a * b;
    divide = a / b;

    printf("sum      = %f\\n", sum);
    printf("subtract = %f\\n", sub);
    printf("multiply = %f\\n", mul);
    printf("divide   = %f\\n", divide);

    return 0;
}`,

    tryIt:{
      desc:"Change the two numbers and see all four results update live.",
      inputs:[
        { id:"ti_a", label:"First number (a)", type:"number", default:10, step:"any" },
        { id:"ti_b", label:"Second number (b)", type:"number", default:3, step:"any" },
      ],
      run(vals){
        const a = parseFloat(vals.ti_a)||0, b = parseFloat(vals.ti_b)||0;
        if(b===0) return `sum      = ${(a+0).toFixed(6)}\nsubtract = ${(a-0).toFixed(6)}\nmultiply = ${(a*0).toFixed(6)}\ndivide   = [ERROR: can't divide by zero]`;
        return `sum      = ${(a+b).toFixed(6)}\nsubtract = ${(a-b).toFixed(6)}\nmultiply = ${(a*b).toFixed(6)}\ndivide   = ${(a/b).toFixed(6)}`;
      }
    }
  },

  {
    num:2, title:"Odd or Even Checker", tag:"conditionals", tagLabel:"Conditionals",
    brief:"Check whether a given integer is odd or even using the modulus operator.",
    concepts:["modulus %","if / else","integer input","%d specifier","== vs ="],

    explanation:`
<p>This program teaches two fundamental ideas: the <strong>modulus operator</strong> and the <strong>if/else statement</strong>.</p>

<p><strong>What does % actually do?</strong> The <code>%</code> operator gives you the <em>remainder</em> after dividing two integers. Think of it like long division from school — you divide and keep the leftover. For example: <code>7 ÷ 2 = 3 remainder 1</code>, so <code>7 % 2 = 1</code>. And <code>8 ÷ 2 = 4 remainder 0</code>, so <code>8 % 2 = 0</code>. If the remainder is zero, the number divided perfectly — it's even. If there's any remainder, it's odd.</p>

<p><strong>What is if/else?</strong> It's a decision. The computer checks a condition — is it true or false? If true, it runs the first block. If false, it skips to <code>else</code> and runs that instead. Only one path ever runs — never both.</p>

<p><strong>The most important distinction in C: <code>=</code> vs <code>==</code></strong>. A single equals sign <code>=</code> is <em>assignment</em> — it puts a value into a variable. Two equals signs <code>==</code> is <em>comparison</em> — it checks whether two values are the same and gives back true or false. Writing <code>if (num % 2 = 0)</code> instead of <code>== 0</code> is one of the most common beginner bugs in C.</p>`,

    whatHappens:[
      "<code>scanf</code> reads the integer into <code>num</code>.",
      "C evaluates <code>num % 2</code> — the remainder when divided by 2.",
      "The <code>if</code> condition checks: is that remainder equal to zero?",
      "If yes (even): the first printf runs. The else is completely skipped.",
      "If no (odd): the if body is skipped, and the else printf runs instead."
    ],

    breakdown:[
      { code:"int num;",            text:"Declares an integer variable. Integers hold whole numbers only: ...-2, -1, 0, 1, 2... No decimals." },
      { code:'scanf("%d", &num);',  text:"<code>%d</code> reads a decimal integer. Always <code>%d</code> for <code>int</code>, <code>%f</code> for <code>float</code>. Don't mix them up!" },
      { code:"num % 2",             text:"The modulus. Result is always 0 or 1 for any integer divided by 2. Zero means divisible, one means not." },
      { code:"if (num % 2 == 0)",   text:"<code>==</code> is comparison (two equal signs). The whole condition evaluates to 1 (true) or 0 (false). The if only runs when it's 1." },
      { code:"else",                text:"No condition needed here — else is the automatic fallback. If the if-condition was false, else runs." },
    ],

    mistakes:[
      { text:"Using <code>=</code> instead of <code>==</code> inside the if: <code>if (num % 2 = 0)</code> — this tries to assign 0 to an expression, which is a compile error or unpredictable behavior." },
      { text:"Using <code>%</code> with floats — modulus only works with integers. <code>3.5 % 2</code> is a compile error." },
    ],

    syntaxTip:"<code>if</code> and <code>else</code> with single-statement bodies don't need curly braces <code>{}</code>, but adding them anyway is safer. If you ever add a second statement without adding braces, the second line won't be part of the if — a very sneaky bug.",

    output:"Enter a number: 7\nThe number is odd",

    rawCode:`#include <stdio.h>

int main() {
    int num;
    printf("Enter a number: ");
    scanf("%d", &num);

    if (num % 2 == 0)
        printf("The number is even\\n");
    else
        printf("The number is odd\\n");

    return 0;
}`,

    tryIt:{
      desc:"Type any integer and see immediately whether it's odd or even.",
      inputs:[
        { id:"ti_n", label:"Enter a number", type:"number", default:7 }
      ],
      run(v){
        const n = Math.trunc(parseFloat(v.ti_n)||0);
        return `The number ${n} is ${n%2===0?'even':'odd'}\n(${n} % 2 = ${Math.abs(n%2)})`;
      }
    }
  },

  {
    num:3, title:"Student Grade Classifier", tag:"conditionals", tagLabel:"Conditionals",
    brief:"Input a mark and print the letter grade: Excellent, V.Good, Good, or Fail.",
    concepts:["if / else if / else","logical AND &&","range checking","condition order matters"],

    explanation:`
<p>This program builds on simple if/else by introducing <strong>else if</strong> chains and the <strong>logical AND operator</strong>. The goal: categorize a number into one of four buckets.</p>

<p><strong>What is else if?</strong> Sometimes you have more than two possibilities. <code>else if</code> lets you chain additional conditions. C checks them one by one from top to bottom and runs <em>only the first one that is true</em>. Once a match is found, all remaining else-ifs and the final else are completely skipped.</p>

<p><strong>What is && (logical AND)?</strong> It means "both conditions must be true at the same time". To catch marks between 80 and 100, we need: the mark must be greater than 80 <em>AND</em> it must be less than or equal to 100. Writing just one condition isn't enough — <code>a > 80</code> alone would also be true for 200, 500, etc.</p>

<p><strong>Why does order matter?</strong> If you put the Fail check first, every mark below 50 would match it and stop — even marks that should be Good. Always put your most restrictive (highest range) condition first. C stops as soon as it finds a true condition.</p>`,

    whatHappens:[
      "User enters a mark, stored in <code>a</code>.",
      "First condition: is a between 81 and 100? If yes → Excellent. Done.",
      "Not excellent? Check: is a between 66 and 80? If yes → V.Good. Done.",
      "Still no match? Check: is a between 50 and 65? If yes → Good. Done.",
      "None of the above matched? The <code>else</code> catches it → Fail."
    ],

    breakdown:[
      { code:"if (100 >= a && a > 80)",         text:"<code>&&</code> joins two conditions. BOTH must be true. This catches marks 81–100. The order of conditions inside && doesn't matter mathematically, but the ordering of if/else if chains does." },
      { code:"else if (80 >= a && a > 65)",      text:"Only reached if the first if was false (a is not in 81-100). This catches 66–80. Notice: we don't need to re-check a <= 100 — we already know that from the first branch failing." },
      { code:"else if (65 >= a && a >= 50)",     text:"Note <code>>=</code> at 50 (inclusive) — a mark of exactly 50 gets Good, not Fail. The boundary choice matters!" },
      { code:"else printf(\"Fail\");",           text:"Catches everything left — any mark below 50. No condition needed; it's the automatic fallback." },
    ],

    mistakes:[
      { text:"Forgetting the second part of the range: writing just <code>if (a > 80)</code> instead of <code>if (100 >= a && a > 80)</code> — correct here because later conditions narrow it down, but unsafe in general." },
      { text:"Putting else before else if — <code>else</code> must always be last. The compiler will reject the code otherwise." },
      { text:"Using <code>&</code> instead of <code>&&</code> — a single <code>&</code> is a bitwise operation, not logical AND. Always use <code>&&</code> for conditions." },
    ],

    syntaxTip:"<code>&&</code> short-circuits: if the left side is false, C doesn't even evaluate the right side. This can matter if the right side has side effects, but for simple comparisons it just saves CPU time.",

    output:"Enter your mark: 75\nV.Good",

    rawCode:`#include <stdio.h>

int main() {
    int a;
    printf("Enter your mark: ");
    scanf("%d", &a);

    if (100 >= a && a > 80)
        printf("Excellent");
    else if (80 >= a && a > 65)
        printf("V.Good");
    else if (65 >= a && a >= 50)
        printf("Good");
    else
        printf("Fail");

    return 0;
}`,

    tryIt:{
      desc:"Enter a mark (0–100) and watch the grade update live.",
      inputs:[
        { id:"ti_m", label:"Mark (0 – 100)", type:"range", min:0, max:100, default:75 }
      ],
      run(v){
        const m = parseInt(v.ti_m);
        let g = m>80?'Excellent':m>65?'V.Good':m>=50?'Good':'Fail';
        return `Mark: ${m}\nGrade: ${g}`;
      }
    }
  },

  {
    num:4, title:"Largest of Three Numbers", tag:"conditionals", tagLabel:"Conditionals",
    brief:"Read three integers and determine which is the largest.",
    concepts:["if / else if / else","logical AND &&","max of N values","comparison operators"],

    explanation:`
<p>Finding the largest of three values is a classic algorithm problem. The key insight: you need to compare each candidate against <em>all</em> the others.</p>

<p><strong>Why can't you just compare two at a time?</strong> If you only checked <code>a > b</code>, you'd know a beats b — but a might still lose to c. You need to confirm a beats <em>both</em> b and c before calling a the winner.</p>

<p><strong>How the logic works:</strong> We have three branches. The first checks if <code>a</code> is bigger than both others. If that's true, a wins — no need to look further. If a doesn't win, we check b. If b doesn't win either, then c must be the largest (it's the only one left). This is why the final case is just <code>else</code> — it's guaranteed to be c if we got that far.</p>

<p><strong>What about ties?</strong> If a equals b and both are larger than c, the first condition <code>a > b</code> is false (they're equal, not greater). So the first branch fails. Then <code>b > a</code> is also false (also equal). So we fall to else — and c gets printed. In a real program you'd handle ties explicitly, but for the exam this logic is sufficient.</p>`,

    whatHappens:[
      "Three integers are read into a, b, c.",
      "First check: does <code>a > b AND a > c</code>? If both true → a is largest.",
      "Second check (only if first failed): does <code>b > a AND b > c</code>? If both true → b is largest.",
      "If both checks failed → c must be the largest (or tied for largest)."
    ],

    breakdown:[
      { code:"scanf(\"%d\", &a);",                text:"Three separate scanf calls, one for each variable. Each one waits for user input before continuing." },
      { code:"if (a > b && a > c)",               text:"a must beat BOTH b and c. Using <code>&&</code> means this only passes when both comparisons are true simultaneously." },
      { code:"else if (b > a && b > c)",          text:"Only evaluated when the first if failed — so we know a is NOT the largest. Now we check if b beats both a and c." },
      { code:"else printf(\"Third...\");",         text:"We don't need to check c explicitly. If neither a nor b is the largest, c must be. The else handles all remaining cases." },
    ],

    mistakes:[
      { text:"Writing <code>if (a > b > c)</code> — this doesn't mean 'a is greater than b and b is greater than c'. In C it evaluates left to right: first <code>a > b</code> gives 0 or 1, then compares that to c. Wrong!" },
      { text:"Forgetting to check against all other values: <code>if (a > b)</code> alone doesn't prove a > c." },
    ],

    syntaxTip:"In C, comparison operators return 1 (true) or 0 (false). They don't return booleans like some other languages. <code>&&</code> combines these: <code>1 && 1 = 1</code>, <code>1 && 0 = 0</code>, <code>0 && anything = 0</code>.",

    output:"Enter first number: 5\nEnter second number: 12\nEnter third number: 8\nSecond number is largest",

    rawCode:`#include <stdio.h>

int main() {
    int a, b, c;
    printf("Enter first number: ");  scanf("%d", &a);
    printf("Enter second number: "); scanf("%d", &b);
    printf("Enter third number: ");  scanf("%d", &c);

    if (a > b && a > c)
        printf("First number is largest\\n");
    else if (b > a && b > c)
        printf("Second number is largest\\n");
    else
        printf("Third number is largest\\n");

    return 0;
}`,

    tryIt:{
      desc:"Set three numbers and find out which is largest.",
      inputs:[
        { id:"ti_a", label:"First number (a)", type:"number", default:5 },
        { id:"ti_b", label:"Second number (b)", type:"number", default:12 },
        { id:"ti_c", label:"Third number (c)", type:"number", default:8 },
      ],
      run(v){
        const a=parseFloat(v.ti_a)||0, b=parseFloat(v.ti_b)||0, c=parseFloat(v.ti_c)||0;
        let res; if(a>b&&a>c)res='First'; else if(b>a&&b>c)res='Second'; else res='Third';
        return `a=${a}, b=${b}, c=${c}\n→ ${res} number is largest`;
      }
    }
  },

  {
    num:5, title:"Lowest of Three Numbers", tag:"conditionals", tagLabel:"Conditionals",
    brief:"Find and print the smallest among three entered numbers.",
    concepts:["if / else if / else","variable assignment","minimum finding","compute-then-output"],

    explanation:`
<p>This is the mirror of Q4 but for finding the <strong>minimum</strong>. There's also a new pattern here worth noting: instead of printing inside each branch, we <em>store the result in a variable first</em>, then print once at the end.</p>

<p><strong>Why store in a variable first?</strong> Imagine later you needed to use the minimum value in a calculation — not just print it. If you printed inside each if branch, you'd have to duplicate that calculation. By storing it in <code>lowest</code>, you compute once and can use the value as many times as you want after. This is called the <strong>"compute first, output once"</strong> pattern and it's a good habit.</p>

<p><strong>What does initializing to 0 mean?</strong> We write <code>int lowest = 0</code>. The value 0 doesn't matter here — it gets overwritten before we ever print it. Initializing to 0 is just good practice (variables in C start with garbage values if you don't set them).</p>`,

    whatHappens:[
      "Three numbers are read.",

<p>The <code>switch</code> statement is C's way of branching on a single value that can match multiple specific options. Think of it as a more organized alternative to a long if/else-if chain when you're matching one variable against many possible values.</p>

<p><strong>How switch works:</strong> C evaluates the expression in parentheses (here: <code>op</code>), then jumps directly to the matching <code>case</code> label. If nothing matches, it jumps to <code>default</code>. It's faster than if/else when there are many options because C can sometimes jump directly instead of checking conditions one by one.</p>

<p><strong>The break statement — critical!</strong> After a case's code runs, C doesn't automatically stop. Without <code>break</code>, execution "falls through" and runs the next case too — and the one after that — until it hits a break or the end of the switch. This is almost always a bug for beginners. Always put <code>break;</code> at the end of every case.</p>

<p><strong>Division by zero:</strong> If the user enters <code>/</code> and b happens to be 0, <code>a / 0</code> in C with integers causes a crash (undefined behaviour). We must check <code>if (b == 0)</code> before dividing. This kind of safety check is called a guard clause.</p>`,

    explanation:`
<p>Factorial is one of the most famous mathematical operations and a perfect example of the <strong>product accumulator</strong> pattern.</p>

<p><strong>What is N! (N factorial)?</strong> It means: multiply all integers from 1 up to N together. So 4! = 1×2×3×4 = 24. And 6! = 1×2×3×4×5×6 = 720.</p>

<p><strong>Why start f at 1, not 0?</strong> This is the most common mistake beginners make here. We're multiplying, not adding. The "neutral element" for multiplication is 1 (multiplying by 1 doesn't change the value). The neutral element for addition is 0. If you start f at 0, the very first multiplication gives 0×1=0, and then every subsequent multiplication also gives 0. The result is always 0. Always initialize a product accumulator to 1.</p>

<p><strong>What is integer overflow?</strong> An <code>int</code> in C can hold values up to about 2,147,483,647. Factorial grows very fast: 13! = 6,227,020,800 — which exceeds this limit. If N > 12, the result "wraps around" and gives a wrong negative number. This is called integer overflow. For larger factorials, you'd use <code>long long</code>.</p>`,

      { code:"f = f * i;",             text:"Each iteration multiplies in one more factor. For N=4: f=1→1×1=1→1×2=2→2×3=6→6×4=24." },
    ],

    ],

    syntaxTip:"Test: what is 0! (zero factorial)? Mathematically it equals 1. The loop <code>for(i=1; i<=0; i++)</code> never runs, so f stays at 1 — correct! C gets this right automatically.",

    output:"Enter factorial: 6\nfactorial = 720",

    rawCode:`#include <stdio.h>

    int N, i, f = 1;
    printf("Enter factorial: ");

        f = f * i;

<p><strong>What is while(1)?</strong> The condition <code>1</code> is always true in C (non-zero = true). So <code>while(1)</code> creates an infinite loop that runs forever. The only way out is a <code>break</code> statement. This is a standard C idiom — you'll see it often in real programs.</p>

<p><strong>The ++ operator:</strong> <code>counteven++</code> is shorthand for <code>counteven = counteven + 1</code>. It's called the increment operator and is so common in C that the language was named "C++" as a joke (C incremented).</p>`,

<p><strong>while vs do-while — when does it matter?</strong></p>

  {

    explanation:`
<p>This program revisits the modulus operator from Q2 but in a more general context: checking if any number divides perfectly into any other.</p>

<p><strong>What does "divisible" mean?</strong> num1 is divisible by num2 if dividing gives a whole number with no remainder. 15 ÷ 5 = 3 exactly (remainder 0) → divisible. 14 ÷ 5 = 2 remainder 4 → not divisible.</p>

<p><strong>The modulus operator again:</strong> <code>num1 % num2</code> gives the remainder. If it's 0, there's no remainder → perfectly divisible. If it's anything else → not divisible. It's that simple.</p>

<p><strong>A missing safety guard:</strong> This program has a flaw — it doesn't check if num2 is 0 before computing <code>num1 % num2</code>. Dividing or using modulus with 0 as the divisor causes undefined behavior in C (usually a crash). In a real program you should always check <code>if (num2 == 0)</code> first. Q20 shows you how to add this guard for division.</p>

<p><strong>Real uses of divisibility:</strong> Checking if a year is a leap year (divisible by 4). FizzBuzz (divisible by 3, by 5). Finding multiples. Checking if a number is prime (not divisible by anything except 1 and itself).</p>`,

    explanation:`
<p>This is the final program and teaches a critical concept: <strong>defensive programming</strong> — writing code that handles bad inputs gracefully instead of crashing.</p>

<p><strong>What happens if you divide by zero in C?</strong></p>
<p>With integers (<code>int a = 5; int b = 0; a/b</code>): the program crashes with a signal (SIGFPE — Floating Point Exception, despite being integers). It's undefined behavior — the worst kind of bug.</p>
<p>With floats (<code>float a = 5.0; float b = 0.0; a/b</code>): C follows the IEEE 754 standard and produces <code>inf</code> (infinity) or <code>nan</code> (not a number). No crash, but the result is mathematically meaningless.</p>

<p><strong>The guard pattern:</strong> Always check the divisor before dividing. This is called a guard clause. Check first, act second. The pattern appears everywhere in real C programs: check for NULL pointers before dereferencing, check file opened before reading, check range before array access.</p>

<p><strong>Why float here?</strong> Using <code>float</code> instead of <code>int</code> means 7/2 = 3.5 (not 3). When dividing two numbers and you care about the exact result, use float.</p>`,

/* ═══════════════════════════════════════
   SYNTAX HIGHLIGHT (card previews)
═══════════════════════════════════════ */
function hl(code){
  let s=code.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  s=s.replace(/"([^"\\]|\\.)*"/g,m=>`<span class="str">${m}</span>`);
  s=s.replace(/(\/\/[^\n]*)/g,m=>`<span class="cm">${m}</span>`);
  s=s.replace(/(#\w+)/g,m=>`<span class="kw">${m}</span>`);
  ['int','float','char','double','void','return','if','else','for','while','do','switch','case','break','default','long','short','unsigned','const'].forEach(k=>{
    s=s.replace(new RegExp('\\b('+k+')\\b','g'),'<span class="kw">$1</span>');
  });
  s=s.replace(/\b(\d+)\b/g,'<span class="num">$1</span>');
  s=s.replace(/\b([a-z_]\w*)\s*(?=\()/g,'<span class="fn">$1</span>');
  return s;
}

═══════════════════════════════════════ */
function getFiltered(){
  let list=filter==='all'?Q:Q.filter(q=>q.tag===filter);
  if(search){const s=search.toLowerCase();list=list.filter(q=>q.title.toLowerCase().includes(s)||q.brief.toLowerCase().includes(s)||q.concepts.some(c=>c.toLowerCase().includes(s)));}
  return list;
}

function filterCards(tag,btn){
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');filter=tag;renderCards();
}

function clearSearch(){
  document.getElementById('search').value='';search='';
  document.getElementById('clear-btn').classList.remove('visible');renderCards();
}

/* ═══════════════════════════════════════
   RENDER CARDS
═══════════════════════════════════════ */
function renderCards(){
  const grid=document.getElementById('grid');
  const filtered=getFiltered();
  const meta=document.getElementById('results-meta');
  if(search||filter!=='all'){meta.textContent=filtered.length+' of '+Q.length+' questions shown';meta.style.display='block';}else{meta.style.display='none';}
  if(!filtered.length){grid.innerHTML='<div class="empty-state">No matches found. Try a different search or filter.</div>';return;}
  queue=filtered.map(q=>q.num);
  grid.innerHTML='';
  filtered.forEach((q,i)=>{
    const isL=learned.includes(q.num);
    const card=document.createElement('div');
    card.className='q-card'+(isL?' learned':'');
    card.style.animationDelay=Math.min(i*.04,.5)+'s';
    card.innerHTML=`
      <div class="q-header">
        <span class="q-num">Q${q.num}</span>
        <span class="q-title">${q.title}</span>
        <span class="q-tag tag-${q.tag}">${q.tagLabel}</span>
      </div>
      <div class="q-body">
        <p class="brief">${q.brief}</p>
        <button class="code-toggle" onclick="toggleCode(this,${q.num})" id="tog-${q.num}">
          <span>▶ main.c</span><span class="caret">▾</span>
        </button>
        <div class="code-block" id="cb-${q.num}">
          <div class="code-bar">
            <span class="dot dot-r"></span><span class="dot dot-y"></span><span class="dot dot-g"></span>
            <span class="code-fname">main.c</span>
            <button class="copy-btn" onclick="copyCode(${q.num},this)">copy</button>
          </div>
          <pre>${hl(q.rawCode)}</pre>
        </div>
        <div class="concepts">${q.concepts.map(c=>'<span class="concept">'+c+'</span>').join('')}</div>
        <div class="card-actions">
          <button class="detail-btn" onclick="openModal(${q.num})">⬡ Deep Study</button>
          <button class="learn-btn ${isL?'active':''}" onclick="toggleLearned(${q.num},event)">
            ${isL?'✓ Learned':'○ Mark learned'}
          </button>
        </div>
      </div>`;
    grid.appendChild(card);
  });
}

function toggleCode(btn,num){
  const b=document.getElementById('cb-'+num);
  b.classList.toggle('visible');btn.classList.toggle('open');
  btn.querySelector('span').textContent=b.classList.contains('visible')?'▼ main.c':'▶ main.c';
}

function copyCode(num,btn){
  const q=Q.find(x=>x.num===num);
  navigator.clipboard.writeText(q.rawCode).then(()=>{btn.textContent='copied!';btn.classList.add('copied');setTimeout(()=>{btn.textContent='copy';btn.classList.remove('copied');},1800);});
}

  if(learned.includes(num)){learned=learned.filter(n=>n!==num);showToast('Removed from learned');}
  else{learned.push(num);showToast('✓ Marked as learned!');}

}

}

function syncLearnBtn(num){

  const isL=learned.includes(num);
  btn.textContent=isL?'✓ Learned':'○ Mark as learned';
  btn.className='learn-btn'+(isL?' active':'');

function openModal(num){

  document.getElementById('m-qnum').textContent='Q'+q.num+' / '+Q.length;
  document.getElementById('m-title').textContent=q.title;

  /* ── LEFT PANEL ── */
  const bkHtml=q.breakdown.map(b=>`

      <div class="bk-code">${escHtml(b.code)}</div>

    </div>`).join('');

  const mistakesHtml=q.mistakes?(
    `<div class="mistakes">
      <div class="mistakes-title">⚠ Common Mistakes</div>
      ${q.mistakes.map(m=>`<div class="mistake-row"><span class="mistake-x">✗</span><span class="mistake-txt">${m.text}</span></div>`).join('')}

  const whatHtml=q.whatHappens?(
    `<div class="what-box">
      <div class="what-box-title">📋 What Happens Step-by-Step</div>
      ${q.whatHappens.map((w,i)=>`<p><strong>${i+1}.</strong> ${w}</p>`).join('')}

      <div class="out-lbl">▸ Expected Output</div>

function buildTryIt(q){
  const body=document.getElementById('tryit-body');
  const icon=document.getElementById('tryit-icon');

  if(!q.tryIt){
    body.innerHTML='<p style="font-size:.75rem;color:var(--muted);padding:4px 0;">No interactive demo for this question.</p>';
    return;
  }

  const ti=q.tryIt;
  let inputsHtml='';
  ti.inputs.forEach(inp=>{
    let control='';
    if(inp.type==='select'){
      control=`<select class="ti-select" id="${inp.id}">
        ${inp.options.map(o=>`<option value="${o}" ${o===inp.default?'selected':''}>${o}</option>`).join('')}
      </select>`;
    } else if(inp.type==='range'){
      control=`<div style="display:flex;align-items:center;gap:8px;">
        <input type="range" class="ti-input" id="${inp.id}" min="${inp.min||0}" max="${inp.max||100}" value="${inp.default||0}" oninput="updateRangeLabel(this,'lbl_${inp.id}')">
        <span id="lbl_${inp.id}" style="font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--accent);min-width:28px;">${inp.default||0}</span>
      </div>`;
    } else {
      control=`<input type="${inp.type}" class="ti-input" id="${inp.id}" value="${inp.default}" ${inp.step?'step="'+inp.step+'"':''} ${inp.min!==undefined?'min="'+inp.min+'"':''} ${inp.max!==undefined?'max="'+inp.max+'"':''} ${inp.maxlength?'maxlength="'+inp.maxlength+'"':''}>`;
    }
    inputsHtml+=`<div class="ti-row"><label class="ti-label">${inp.label}</label>${control}</div>`;
  });

  body.innerHTML=`
    <p style="font-size:.76rem;color:var(--t2);line-height:1.6;">${ti.desc}</p>
    ${inputsHtml}
    <button class="ti-run" onclick="runTryIt(${q.num})">▶ Run</button>
    <div class="ti-terminal" id="ti-out"></div>`;

  // auto-run on any input change
  body.querySelectorAll('input,select').forEach(el=>{
    el.addEventListener('change',()=>runTryIt(q.num));
    el.addEventListener('input',()=>runTryIt(q.num));
  });
}

function updateRangeLabel(el,lblId){
  const lbl=document.getElementById(lblId);
  if(lbl) lbl.textContent=el.value;
}

function runTryIt(num){
  const q=Q.find(x=>x.num===num);
  if(!q||!q.tryIt) return;
  const vals={};
  q.tryIt.inputs.forEach(inp=>{
    const el=document.getElementById(inp.id);
    if(el) vals[inp.id]=el.value;
  });
  try{
    const out=q.tryIt.run(vals);
    const term=document.getElementById('ti-out');
    term.textContent=out;
    term.classList.add('visible');
  }catch(e){
    const term=document.getElementById('ti-out');
    term.textContent='Error: '+e.message;
    term.classList.add('visible');
  }
}

let tT;
function showToast(msg){
  const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');
  clearTimeout(tT);tT=setTimeout(()=>t.classList.remove('show'),2100);
}

═══════════════════════════════════════ */
function escHtml(s){return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

/* ═══════════════════════════════════════
   SWIPE
═══════════════════════════════════════ */
let tx=0;
document.getElementById('modal-box').addEventListener('touchstart',e=>{tx=e.touches[0].clientX;},{passive:true});
document.getElementById('modal-box').addEventListener('touchend',e=>{
  const d=e.changedTouches[0].clientX-tx;
  if(Math.abs(d)>70&&document.activeElement.tagName!=='INPUT'&&document.activeElement.tagName!=='TEXTAREA') navModal(d<0?1:-1);
},{passive:true});
