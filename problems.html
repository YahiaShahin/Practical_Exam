<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Practice Problems - C Programming | Mansoura Uni Prep 2026</title>
<meta name="description" content="20 interactive C programming exam problems with explanations, code breakdowns, and Try It panels.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/responsive.css">
<link rel="stylesheet" href="css/problems.css">
<script src="js/nav.js"></script>
</head>
<body>

<!-- NAVBAR injected by nav.js -->

<header class="prob-header">
  <div class="eyebrow">C Programming</div>
  <h1>Practical <em>Exam</em> Study Guide</h1>
  <p class="subtitle">// comprehensive practice - explanations - interactive Try It - progress tracking</p>
  <div class="stats-row">
    <div class="stat"><span class="stat-num" id="hdr-questions">0</span><span class="stat-label">Questions</span></div>
    <div class="stat"><span class="stat-num" id="hdr-topics">0</span><span class="stat-label">Topics</span></div>
    <div class="stat"><span class="stat-num" id="hdr-learned">0</span><span class="stat-label">Learned</span></div>
  </div>
</header>

<div class="toolbar">
  <div class="toolbar-top">
    <div class="search-wrap">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
      <input type="text" class="search-input" id="search" placeholder="Search questions, concepts...">
    </div>
    <button class="clear-btn" id="clear-btn" onclick="clearSearch()">&#10005; Clear</button>
    <div class="mode-toggle-wrap">
      <button class="mode-toggle-btn active" id="mode-btn-detailed" onclick="setModalMode('detailed')">Detailed</button>
      <button class="mode-toggle-btn" id="mode-btn-brief" onclick="setModalMode('brief')">⚡ Brief</button>
    </div>
  </div>
  <div class="filter-row" id="filter-row">
    <!-- Buttons dynamically generated by JS -->
  </div>
</div>

<div class="prog-wrap">
  <div class="prog-inner">
    <div class="prog-track"><div class="prog-fill" id="prog-fill"></div></div>
    <span class="prog-text" id="prog-text">0 / 20 learned</span>
    <button class="reset-btn" onclick="resetProgress()">Reset</button>
  </div>
</div>
<div class="results-meta" id="results-meta"></div>

<div class="q-list" id="grid"></div>

<!-- MODAL -->
<div class="modal-overlay" id="modal" onclick="onOverlayClick(event)">
  <div class="modal-wrap">
    <div class="modal" id="modal-box" onclick="event.stopPropagation()">
      <div class="m-hdr">
        <span class="m-qnum" id="m-qnum"></span>
        <span class="m-title" id="m-title"></span>
        <button class="m-nav" id="m-prev" onclick="navModal(-1)">&larr; Prev</button>
        <button class="m-nav" id="m-next" onclick="navModal(1)">Next &rarr;</button>
        <button class="m-close" onclick="closeModal()">&#10005;</button>
      </div>
      <div class="m-body">
        <div class="m-left" id="m-left"></div>
        <div class="m-right">
          <div class="code-panel-hdr">
            <span class="dot dot-r"></span><span class="dot dot-y"></span><span class="dot dot-g"></span>
            <span class="code-panel-fname" id="cp-fname">main.c</span>
            <button class="cp-btn" onclick="copyModalCode()">copy</button>
          </div>
          <div class="code-display" id="code-display"></div>
          <div class="tryit-panel">
            <div class="tryit-hdr" onclick="toggleTryIt()" id="tryit-hdr">
              <span class="tryit-hdr-lbl">&#9889; Try It</span>
              <span class="tryit-hdr-icon" id="tryit-icon">&#9662;</span>
            </div>
            <div class="tryit-body hidden" id="tryit-body"></div>
          </div>
          <div class="notes-wrap">
            <div class="notes-lbl">MY NOTES -- auto-saved</div>
            <textarea class="notes-ta" id="notes-ta" placeholder="Write anything here -- saved per question..."></textarea>
          </div>
        </div>
      </div>
      <div class="m-foot">
        <button class="learn-btn" id="m-learn" onclick="toggleLearnedModal()">&#9675; Mark as learned</button>
        <span style="flex:1"></span>
        <span style="font-family:var(--font-mono);font-size:9px;color:var(--muted);">&larr; &rarr; navigate &nbsp;&middot;&nbsp; Esc close</span>
      </div>
    </div>
  </div>
</div>

<button class="btt" id="btt">&uarr;</button>
<div class="toast" id="toast"></div>

<script src="js/problems-data.js"></script>
<script src="js/problems.js"></script>
</body>
</html>
